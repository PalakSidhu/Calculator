<!DOCTYPE html>
<html lang="en">
<head>

    <title>Flex Calculator</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <div class="container">

        <div class="display"></div>

        <div class="buttons">

            <div class="box gray">AC</div>
            <div class="box gray">DEL</div>
            <div class="box gray">%</div>
            <div class="box orange">/</div>

            <div class="box">7</div>
            <div class="box">8</div>
            <div class="box">9</div>
            <div class="box orange">*</div>

            <div class="box">4</div>
            <div class="box">5</div>
            <div class="box">6</div>
            <div class="box orange">-</div>

            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box orange">+</div>

            <div class="box zero">0</div>
            <div class="box">.</div>
            <div class="box orange">=</div>

        </div>

    </div>

</body>
</html>
