<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="piano">

    <!-- White Keys -->
    <div class="white-key"data-sound="sounds/A0.mp3">C</div>
    <div class="white-key"data-sound="sounds/A1.mp3">D</div>
    <div class="white-key"data-sound="sounds/A2.mp3">E</div>
    <div class="white-key"data-sound="sounds/A3.mp3">F</div>
    <div class="white-key"data-sound="sounds/A4.mp3">G</div>
    <div class="white-key"data-sound="sounds/A5.mp3">A</div>
    <div class="white-key">B</div>

    <div class="white-key">C</div>
    <div class="white-key">D</div>
    <div class="white-key">E</div>
    <div class="white-key">F</div>
    <div class="white-key">G</div>
    <div class="white-key">A</div>
    <div class="white-key">B</div>

    <!-- Black Keys -->
    <div class="black-key k1"></div>
    <div class="black-key k2"></div>

    <div class="black-key k3"></div>
    <div class="black-key k4"></div>
    <div class="black-key k7"></div>

    <div class="black-key k8"></div>
    <div class="black-key k9"></div>
    <div class="black-key k10"></div>

</div>
<script src="script.js"></script>
</body>
</html>
